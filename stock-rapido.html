  <script>
    (function () {
      const aplicarPerfilPantalla = () => {
        const viewport = window.visualViewport || {};
        const ancho = Math.round(viewport.width || window.innerWidth || document.documentElement.clientWidth || 1024);
        const alto = Math.round(viewport.height || window.innerHeight || document.documentElement.clientHeight || 768);
        const tipo = ancho < 640 ? 'phone' : (ancho < 1024 ? 'tablet' : (ancho >= 1536 ? 'wide' : 'desktop'));
        const orientacion = ancho >= alto ? 'landscape' : 'portrait';
        const altura = alto < 620 ? 'short' : 'normal';
        const densidad = ancho < 390 || alto < 560 ? 'compact' : 'normal';
        const root = document.documentElement;
        root.dataset.sfScreen = tipo;
        root.dataset.sfOrientation = orientacion;
        root.dataset.sfHeight = altura;
        root.dataset.sfDensity = densidad;
        root.style.setProperty('--sf-vw', ancho + 'px');
        root.style.setProperty('--sf-vh', alto + 'px');
      };
      aplicarPerfilPantalla();
      window.addEventListener('resize', aplicarPerfilPantalla);
      window.addEventListener('orientationchange', aplicarPerfilPantalla);
      window.visualViewport?.addEventListener('resize', aplicarPerfilPantalla);
      window.visualViewport?.addEventListener('scroll', aplicarPerfilPantalla);
    })();
  </script>

        if (existingIndex >= 0) {

          renderHistory();

        return (data.descripcion || data.nombre || data.name || data.titulo || data.codigo || 'Producto sin nombre').toString().trim();

      const getProductPrice = (data = {}) => {
        return Number(String(data.precioLista ?? data.precio ?? data.price ?? data.originalPrice ?? 0).replace(',', '.')) || 0;
      };
      const getProductImage = (data = {}) => data.imagen || data.image || data.url || data.fotoUrl || '';
      const getProductBrandLogo = (data = {}) => data.logoMarca || data.logo_marca || data.brandLogo || '';

      const setBrandLogoForOffer = (logoValue = '') => {
        currentBrandLogo = (logoValue || '').toString().trim();

        elements.brandLogoToggle.disabled = !hasBrandLogo;

      function applyProductToOffer(product = {}) {
        const title = getProductTitle(product);
        const price = getProductPrice(product);

        elements.name.value = title;
        elements.originalPrice.value = price || '';
        elements.discount.value = elements.discount.value || 15;
        const discount = elements.discountEnabled.checked ? (Number(elements.discount.value) || 0) : 0;
        elements.offerPrice.value = price ? Math.round(price * (1 - discount / 100)) : '';
        elements.description.value = product.detalles || product.descripcion || product.description || title;

        const imgUrl = getProductImage(product);
        if (imgUrl) elements.displayImage.src = imgUrl;

      function renderInventoryList() {
        const query = normalizeText(elements.inventorySearchInput.value);
        const filtered = inventoryProducts
          .filter((product) => {
            if (!query) return true;
            const haystack = [
              getProductTitle(product),
              product.codigo,
              product.marca,
              product.categoria,
              product.detalles
            ].map((value) => normalizeText(value || '')).join(' ');
            return haystack.includes(query);
          })
          .slice(0, 80);

        if (!inventoryProducts.length) {
          elements.inventoryList.innerHTML = '<div class="p-8 text-center font-bold text-gray-500">No hay productos cargados en inventario.</div>';
          return;
        }

        if (!filtered.length) {
          elements.inventoryList.innerHTML = '<div class="p-8 text-center font-bold text-gray-500">No hay productos para esa busqueda.</div>';
          return;
        }

        elements.inventoryList.innerHTML = filtered.map((product) => {
          const title = getProductTitle(product);
          const price = getProductPrice(product);
          const image = getProductImage(product);
          const meta = [product.codigo, product.marca, product.categoria].filter(Boolean).join(' - ');
          return `
            <button type="button" data-product-id="${product.id}" class="w-full p-4 text-left hover:bg-indigo-50 transition-colors flex items-center gap-4">
              <div class="w-16 h-16 rounded-xl border border-gray-200 bg-white overflow-hidden flex items-center justify-center shrink-0">
                ${image ? `<img src="${image}" alt="${title}" loading="lazy" class="w-full h-full object-contain">` : `<i data-lucide="image" class="w-6 h-6 text-gray-300"></i>`}
              </div>
              <div class="min-w-0 flex-1">
                <p class="font-black text-gray-900 truncate">${title}</p>
                <p class="text-xs font-bold text-gray-500 truncate mt-0.5">${meta || 'Sin codigo adicional'}</p>
              </div>
              <div class="text-right shrink-0">
                <p class="text-[10px] font-black text-gray-400 uppercase">Precio</p>
                <p class="font-black text-indigo-700">${formatMoney(price)}</p>
              </div>
            </button>
          `;
        }).join('');
        lucide.createIcons();
      }

      async function cargarInventario() {
        try {
          await asegurarSesionFirebase();
          const querySnapshot = await getDocs(collection(db, "productos"));
          inventoryProducts = [];
          if (querySnapshot.empty) {
            elements.inventoryStatus.textContent = 'No se encontraron productos.';
            renderInventoryList();
            return;
          }
          querySnapshot.forEach((doc) => {
            inventoryProducts.push({ id: doc.id, ...doc.data() });
          });
          inventoryProducts.sort((a, b) => getProductTitle(a).localeCompare(getProductTitle(b), 'es'));
          elements.inventoryStatus.textContent = `${inventoryProducts.length} productos disponibles.`;
          renderInventoryList();
        } catch (error) {
          console.warn("No se pudo cargar el inventario para ofertas:", error);
          elements.inventoryStatus.textContent = 'No se pudo cargar inventario. Puedes completar la oferta manualmente.';
          inventoryProducts = [];
          renderInventoryList();
        }
      }

      // ==========================================
      // LOGICA DE INTERFAZ Y ACTUALIZACION
      // ==========================================
      const formatMoney = (value) => {
        return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(value || 0);
      };

      const clampDiscount = (value) => Math.min(100, Math.max(0, Number(value) || 0));
      const calcularDescuentoDesdePrecio = (original, oferta) => {
        const origPrice = Number(original) || 0;
        const offPrice = Number(oferta) || 0;
        if (!origPrice || !offPrice || offPrice >= origPrice) return 0;
        return Math.round(((origPrice - offPrice) / origPrice) * 100);
      };

      const updateDiscountControls = () => {
        const enabled = elements.discountEnabled.checked;
        elements.discountField.classList.toggle('hidden', !enabled);
        elements.discount.disabled = !enabled;
        elements.offerPrice.readOnly = !enabled;
        elements.offerPrice.classList.toggle('opacity-70', !enabled);
        elements.offerPrice.classList.toggle('cursor-not-allowed', !enabled);
        if (!enabled) {
          elements.discount.value = clampDiscount(elements.discount.value);

      const syncOfferPriceFromDiscount = () => {
        if (syncingPrices) return;

          syncingPrices = true;
          elements.offerPrice.value = elements.originalPrice.value || '';
          syncingPrices = false;
          updatePreview();
          return;
        }
        syncingPrices = true;
        const origPrice = Number(elements.originalPrice.value) || 0;
        const discount = clampDiscount(elements.discount.value);
        elements.discount.value = discount;
        elements.offerPrice.value = origPrice ? Math.round(origPrice * (1 - discount / 100)) : '';

        updatePreview();

      const syncDiscountFromOfferPrice = () => {
        if (syncingPrices) return;

          syncingPrices = true;
          elements.offerPrice.value = elements.originalPrice.value || '';
          syncingPrices = false;
          updatePreview();
          return;
        }
        syncingPrices = true;
        elements.discount.value = calcularDescuentoDesdePrecio(elements.originalPrice.value, elements.offerPrice.value);

        updatePreview();

        elements.pricePanel.classList.toggle('hidden', !showPrice);

          : 'hidden';

          : 'font-black text-gray-950 leading-[1.08] text-center uppercase tracking-tight h-[118px] overflow-hidden px-1';
        elements.displayDescription.className = showPrice
          ? 'text-gray-500 leading-snug text-center font-semibold h-[42px] overflow-hidden px-2'

        elements.displayName.style.fontSize = titleLength > 84 ? '14px' : titleLength > 58 ? '17px' : '21px';
        elements.displayDescription.style.fontSize = descriptionLength > 110 ? '9px' : descriptionLength > 76 ? '10px' : '11px';
        elements.displayName.style.display = '-webkit-box';
        elements.displayName.style.WebkitBoxOrient = 'vertical';

        elements.displayDescription.style.display = '-webkit-box';

        if (showPrice && hasDiscountVisual) {

        if (showBrandLogo) {
          elements.brandLogoImage.src = currentBrandLogo;

        } else {
          elements.brandLogoBadge.style.display = 'none';
        }

        // Etiqueta Flash
        elements.flashBadge.style.display = elements.flashToggle.checked ? 'inline-flex' : 'none';
        elements.newArrivalBadge.style.display = elements.newArrivalToggle.checked ? 'inline-flex' : 'none';
      };

      elements.file.addEventListener('change', (e) => {

      elements.discount.addEventListener('input', syncOfferPriceFromDiscount);

      ['name', 'description', 'flashToggle', 'newArrivalToggle', 'brandLogoToggle'].forEach(id => {
        elements[id].addEventListener('change', updatePreview);
        elements[id].addEventListener('input', updatePreview);

      elements.btnSaveOffer.addEventListener('click', () => {
        const result = saveToHistory();
        elements.btnSaveOffer.innerHTML = result === 'updated'
          ? `<i data-lucide="check" class="w-4 h-4"></i> Actualizada`

      const EXPORT_RESOLUTION_STEPS = [
        { width: 2160, height: 3840, label: '2160x3840' },
        { width: 1800, height: 3200, label: '1800x3200' },
        { width: 1600, height: 2844, label: '1600x2844' },
        { width: 1440, height: 2560, label: '1440x2560' }
      ];

      const waitForImageElement = (img) => {
        if (!img) return Promise.resolve();
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise((resolve) => {
          const finish = () => resolve();
          img.addEventListener('load', finish, { once: true });
          img.addEventListener('error', finish, { once: true });
          window.setTimeout(finish, 1800);
        });
      };

      const waitForImagesInNode = async (node) => {
        const images = Array.from(node?.querySelectorAll?.('img') || []);
        await Promise.all(images.map(waitForImageElement));
      };

      const EXPORT_PLACEHOLDER_IMAGE = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

      const createExportPlaceholderDataUrl = (label = 'Imagen no disponible') => {
        const safeLabel = (label || 'Imagen no disponible').toString().replace(/[<>&"]/g, '');
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e2e8f0" />
                <stop offset="100%" stop-color="#cbd5e1" />
              </linearGradient>
            </defs>
            <rect width="1080" height="1080" fill="url(#bg)" />
            <rect x="120" y="120" width="840" height="840" rx="56" fill="rgba(255,255,255,0.72)" stroke="rgba(71,85,105,0.16)" stroke-width="8" />
            <path d="M370 700l120-160 94 110 128-180 122 230H246l124-150z" fill="#94a3b8" opacity="0.92" />
            <circle cx="440" cy="380" r="58" fill="#cbd5e1" />
            <text x="540" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#334155">
              ${safeLabel}
            </text>
            <text x="540" y="845" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#64748b">
              Exportada sin acceso al origen externo
            </text>
          </svg>
        `.trim();
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      };

      const buildExportProxyCandidates = (src) => {
        if (!/^https?:\/\//i.test(src)) return [];
        const normalized = src.replace(/^https?:\/\//i, '');
        return [
          `https://images.weserv.nl/?url=${encodeURIComponent(normalized)}&output=jpg`,
          `https://wsrv.nl/?url=${encodeURIComponent(normalized)}&output=jpg`
        ];
      };

      const fetchImageAsDataUrl = async (src) => {
        const candidates = [src, ...buildExportProxyCandidates(src)];
        let lastError = null;
        for (const candidate of candidates) {
          try {
            const response = await fetch(candidate, { cache: 'no-store', mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const blob = await response.blob();
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result);
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            });
            if (typeof dataUrl === 'string' && dataUrl.startsWith('data:')) {
              return dataUrl;
            }
            throw new Error('No se obtuvo un data URL valido.');
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error('No se pudo obtener la imagen en modo exportacion.');
      };

      const tryInlineImageToDataUrl = async (img) => {
        const src = (img?.getAttribute('src') || '').trim();
        if (!src || src.startsWith('data:') || src.startsWith('blob:')) return true;
        try {
          const dataUrl = await fetchImageAsDataUrl(src);
          if (typeof dataUrl === 'string' && dataUrl.startsWith('data:')) {
            img.src = dataUrl;
            return true;
          }
        } catch (error) {
          console.warn('No se pudo convertir una imagen a data URL para exportar.', src, error);
        }
        return false;
      };

      const inlineNodeImagesForExport = async (node) => {
        const images = Array.from(node?.querySelectorAll?.('img') || []);
        const originalStates = images.map((img) => ({
          src: img.getAttribute('src'),
          srcset: img.getAttribute('srcset'),
          display: img.style.display,
          visibility: img.style.visibility
        }));
        const badgesToRestore = [];

        await Promise.all(images.map(async (img) => {
          const wasInlined = await tryInlineImageToDataUrl(img);
          if (wasInlined) return;

          const isBrandLogo = img.id === 'brandLogoImage';
          const isCompanyLogo = img.id === 'offerLogo';
          const parentBadge = isBrandLogo ? img.closest('#brand-logo-badge') : null;

          if (parentBadge) {
            badgesToRestore.push({ node: parentBadge, display: parentBadge.style.display });
            parentBadge.style.display = 'none';
          }

          img.src = isBrandLogo || isCompanyLogo
            ? EXPORT_PLACEHOLDER_IMAGE
            : createExportPlaceholderDataUrl(img.alt || 'Imagen no disponible');
        }));
        await waitForImagesInNode(node);
        return () => {
          images.forEach((img, index) => {
            const originalState = originalStates[index];
            if (originalState?.src != null) img.setAttribute('src', originalState.src);
            if (originalState?.srcset != null) img.setAttribute('srcset', originalState.srcset);
            else img.removeAttribute('srcset');
            img.style.display = originalState?.display || '';
            img.style.visibility = originalState?.visibility || '';
          });
          badgesToRestore.forEach(({ node: badgeNode, display }) => {
            badgeNode.style.display = display || '';
          });
        };
      };

      const downloadBlobAsFile = (blob, fileName) => {
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.download = fileName;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.setTimeout(() => URL.revokeObjectURL(url), 2000);
      };

      const withCanvasFont = (ctx, element, fallbackSize = 24, scale = 1) => {
        const style = window.getComputedStyle(element);
        const size = (parseFloat(style.fontSize) || fallbackSize) * scale;
        const weight = style.fontWeight || '700';
        const family = style.fontFamily || 'Arial, sans-serif';
        ctx.font = `${weight} ${size}px ${family}`;
        ctx.fillStyle = style.color || '#111827';
        ctx.textBaseline = 'top';
        return { size, lineHeight: (parseFloat(style.lineHeight) || (parseFloat(style.fontSize) || fallbackSize) * 1.2) * scale };
      };

      const roundRectPath = (ctx, x, y, width, height, radius = 0) => {
        const r = Math.max(0, Math.min(radius, width / 2, height / 2));
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      };

      const fillRoundedRect = (ctx, x, y, width, height, radius, fillStyle) => {
        ctx.save();
        roundRectPath(ctx, x, y, width, height, radius);
        ctx.fillStyle = fillStyle;
        ctx.fill();
        ctx.restore();
      };

      const getNodeRect = (element, rootRect, scaleX, scaleY) => {
        const rect = element.getBoundingClientRect();
        return {
          x: (rect.left - rootRect.left) * scaleX,
          y: (rect.top - rootRect.top) * scaleY,
          width: rect.width * scaleX,
          height: rect.height * scaleY
        };
      };

      const blobToDataUrl = (blob) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      const loadImageForCanvas = async (src, label = 'Imagen no disponible') => {
        const safeSrc = (src || '').toString().trim();
        let dataUrl = safeSrc;
        if (!dataUrl) dataUrl = createExportPlaceholderDataUrl(label);
        if (dataUrl.startsWith('//')) dataUrl = `${window.location.protocol}${dataUrl}`;
        if (dataUrl.startsWith('blob:')) {
          try {
            const response = await fetch(dataUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            dataUrl = await blobToDataUrl(await response.blob());
          } catch (error) {
            console.warn('Se usara placeholder para una imagen blob bloqueada.', safeSrc, error);
            dataUrl = createExportPlaceholderDataUrl(label);
          }
        }
        if (/^https?:\/\//i.test(dataUrl) || dataUrl.startsWith('./') || dataUrl.startsWith('/')) {
          try {
            dataUrl = await fetchImageAsDataUrl(dataUrl);
          } catch (error) {
            console.warn('Se usara placeholder para una imagen bloqueada.', safeSrc, error);
            dataUrl = createExportPlaceholderDataUrl(label);
          }
        }
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => {
            const fallback = new Image();
            fallback.onload = () => resolve(fallback);
            fallback.src = createExportPlaceholderDataUrl(label);
          };
          image.src = dataUrl;
        });
      };

      const drawImageFit = (ctx, image, box, fit = 'cover') => {
        const iw = image.naturalWidth || image.width || 1;
        const ih = image.naturalHeight || image.height || 1;
        const scale = fit === 'contain'
          ? Math.min(box.width / iw, box.height / ih)
          : Math.max(box.width / iw, box.height / ih);
        const width = iw * scale;
        const height = ih * scale;
        const x = box.x + (box.width - width) / 2;
        const y = box.y + (box.height - height) / 2;
        ctx.drawImage(image, x, y, width, height);
      };

      const drawWrappedText = (ctx, text, x, y, maxWidth, lineHeight, maxLines = 2) => {
        const words = (text || '').toString().trim().split(/\s+/).filter(Boolean);
        const lines = [];
        let current = '';
        words.forEach((word) => {
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth || !current) {
            current = test;
            return;
          }
          lines.push(current);
          current = word;
        });
        if (current) lines.push(current);
        lines.slice(0, maxLines).forEach((line, index) => {
          const value = index === maxLines - 1 && lines.length > maxLines ? `${line.replace(/\s+\S+$/, '')}...` : line;
          ctx.fillText(value, x, y + index * lineHeight);
        });
      };

      const renderOfferCanvasFallback = async (node) => {
        const step = EXPORT_RESOLUTION_STEPS[0];
        const rect = node.getBoundingClientRect();
        const baseWidth = Math.max(1, rect.width || 360);
        const baseHeight = Math.max(1, rect.height || 640);
        const scaleX = step.width / baseWidth;
        const scaleY = step.height / baseHeight;
        const avgScale = (scaleX + scaleY) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = step.width;
        canvas.height = step.height;
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('No se pudo preparar el canvas alternativo.');

        const rootRect = node.getBoundingClientRect();
        const visual = templateVisuals[currentTemplate] || templateVisuals.clean || templateVisuals.classic;
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
        if (currentTemplate === 'empresa_clean' || currentTemplate === 'clean' || currentTemplate === 'card') {
          bg.addColorStop(0, '#f8fafc');
          bg.addColorStop(1, '#ffffff');
        } else if (currentTemplate === 'focus') {
          bg.addColorStop(0, '#0f172a');
          bg.addColorStop(1, '#1d4ed8');
        } else {
          bg.addColorStop(0, '#2563eb');
          bg.addColorStop(0.62, '#2563eb');
          bg.addColorStop(1, '#1e3a8a');
        }
        fillRoundedRect(ctx, 0, 0, canvas.width, canvas.height, 24 * avgScale, bg);

        const logoBox = getNodeRect(elements.offerLogoShell, rootRect, scaleX, scaleY);
        const logoImg = await loadImageForCanvas(elements.logo.src || getLogoForCurrentTemplate(), 'Logo');
        drawImageFit(ctx, logoImg, logoBox, 'contain');

        const frameBox = getNodeRect(elements.imageFrame, rootRect, scaleX, scaleY);
        const frameStyle = window.getComputedStyle(elements.imageFrame);
        const frameRadius = parseFloat(frameStyle.borderRadius) * avgScale || 38 * avgScale;
        fillRoundedRect(ctx, frameBox.x, frameBox.y, frameBox.width, frameBox.height, frameRadius, frameStyle.backgroundColor || '#ffffff');
        ctx.save();
        roundRectPath(ctx, frameBox.x, frameBox.y, frameBox.width, frameBox.height, frameRadius);
        ctx.clip();
        const productImg = await loadImageForCanvas(elements.displayImage.src, 'Imagen del producto');
        const fit = window.getComputedStyle(elements.displayImage).objectFit || 'cover';
        drawImageFit(ctx, productImg, frameBox, fit);
        ctx.restore();

        if (elements.discountBadge.style.display !== 'none') {
          const badge = getNodeRect(elements.discountBadge, rootRect, scaleX, scaleY);
          fillRoundedRect(ctx, badge.x, badge.y, badge.width, badge.height, 14 * avgScale, visual.discountBg || '#facc15');
          withCanvasFont(ctx, elements.displayDiscount, 42, avgScale);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = visual.discountColor || '#111827';
          ctx.fillText(elements.displayDiscount.textContent, badge.x + badge.width / 2, badge.y + badge.height / 2);
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
        }

        const drawPillBadge = (badgeEl, textEl, bg, color) => {
          if (badgeEl.style.display === 'none') return;
          const box = getNodeRect(badgeEl, rootRect, scaleX, scaleY);
          fillRoundedRect(ctx, box.x, box.y, box.width, box.height, 7 * avgScale, bg);
          withCanvasFont(ctx, badgeEl, 16, avgScale);
          ctx.fillStyle = color;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(textEl, box.x + box.width / 2, box.y + box.height / 2);
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
        };
        drawPillBadge(elements.flashBadge, elements.flashBadge.textContent.trim(), visual.flashBg || '#dc2626', visual.flashColor || '#ffffff');
        drawPillBadge(elements.newArrivalBadge, elements.newArrivalBadge.textContent.trim(), visual.newArrivalBg || '#16a34a', visual.newArrivalColor || '#ffffff');

        const cardBox = getNodeRect(elements.infoCard, rootRect, scaleX, scaleY);
        const cardStyle = window.getComputedStyle(elements.infoCard);
        fillRoundedRect(ctx, cardBox.x, cardBox.y, cardBox.width, cardBox.height, 22 * avgScale, cardStyle.backgroundColor || '#ffffff');
        const pad = 16 * avgScale;
        const titleFont = withCanvasFont(ctx, elements.displayName, 34, avgScale);
        ctx.fillStyle = visual.titleColor || cardStyle.color || '#111827';
        drawWrappedText(ctx, elements.displayName.textContent, cardBox.x + pad, cardBox.y + pad, cardBox.width - pad * 2, titleFont.lineHeight, 2);

        const descFont = withCanvasFont(ctx, elements.displayDescription, 18, avgScale);
        ctx.fillStyle = visual.descColor || '#64748b';
        drawWrappedText(ctx, elements.displayDescription.textContent, cardBox.x + pad, cardBox.y + pad + 58 * avgScale, cardBox.width - pad * 2, descFont.lineHeight, 2);

        if (elements.pricePanel.style.display !== 'none') {
          const priceBox = getNodeRect(elements.pricePanel, rootRect, scaleX, scaleY);
          const priceStyle = window.getComputedStyle(elements.pricePanel);
          fillRoundedRect(ctx, priceBox.x, priceBox.y, priceBox.width, priceBox.height, 18 * avgScale, priceStyle.backgroundColor || '#f8fafc');

          withCanvasFont(ctx, elements.displayPriceLabel, 18, avgScale);
          ctx.fillStyle = visual.priceLabelColor || '#64748b';
          ctx.textAlign = elements.discountEnabled.checked ? 'right' : 'center';
          const priceX = elements.discountEnabled.checked ? priceBox.x + priceBox.width - pad : priceBox.x + priceBox.width / 2;
          ctx.fillText(elements.displayPriceLabel.textContent, priceX, priceBox.y + 12 * avgScale);
          withCanvasFont(ctx, elements.displayOfferPrice, 40, avgScale);
          ctx.fillStyle = visual.offerPriceColor || '#2563eb';
          ctx.fillText(elements.displayOfferPrice.textContent, priceX, priceBox.y + 34 * avgScale);

          if (elements.discountEnabled.checked) {
            ctx.textAlign = 'left';
            withCanvasFont(ctx, elements.displayOriginalPrice, 18, avgScale);
            ctx.fillStyle = visual.originalPriceColor || '#94a3b8';
            ctx.fillText('Antes', priceBox.x + pad, priceBox.y + 12 * avgScale);
            ctx.fillText(elements.displayOriginalPrice.textContent, priceBox.x + pad, priceBox.y + 34 * avgScale);
          }
          ctx.textAlign = 'left';
        }

        const footerBox = getNodeRect(elements.businessFooter, rootRect, scaleX, scaleY);
        fillRoundedRect(ctx, footerBox.x, footerBox.y, footerBox.width, footerBox.height, 12 * avgScale, visual.footerBg || 'rgba(255,255,255,0.9)');
        ctx.fillStyle = visual.footerColor || '#1f2937';
        ctx.font = `700 ${12 * avgScale}px Arial, sans-serif`;
        [elements.footerWeb.textContent, elements.footerWhatsapp.textContent, elements.footerEmail.textContent]
          .filter(Boolean)
          .forEach((line, index) => ctx.fillText(line, footerBox.x + 12 * avgScale, footerBox.y + (8 + index * 14) * avgScale));

        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.96));
        if (!blob) throw new Error('No se pudo generar la imagen alternativa.');
        return { blob, resolution: `${step.label} fallback` };
      };

      const exportOfferJpegBlob = async (node) => {
        const htmlToImageApi = window.htmlToImage;
        if (!htmlToImageApi?.toCanvas) {
          return renderOfferCanvasFallback(node);
        }

        const rect = node.getBoundingClientRect();
        const nodeWidth = Math.max(1, Math.round(rect.width || node.offsetWidth || 360));
        const nodeHeight = Math.max(1, Math.round(rect.height || node.offsetHeight || 640));
        const restoreImages = await inlineNodeImagesForExport(node);
        let lastError = null;
        try {
          const baseCanvas = await htmlToImageApi.toCanvas(node, {
            pixelRatio: 2,
            cacheBust: true,
            backgroundColor: '#ffffff',
            width: nodeWidth,
            height: nodeHeight,
            style: {
              width: `${nodeWidth}px`,
              height: `${nodeHeight}px`,
              transform: 'none'
            }
          });
          if (!baseCanvas) throw new Error('No se pudo capturar la tarjeta base.');

          for (const step of EXPORT_RESOLUTION_STEPS) {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = step.width;
              canvas.height = step.height;
              const ctx = canvas.getContext('2d');
              if (!ctx) throw new Error('No se pudo preparar el canvas final.');
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.imageSmoothingEnabled = true;
              ctx.imageSmoothingQuality = 'high';
              ctx.drawImage(baseCanvas, 0, 0, canvas.width, canvas.height);
              const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.96));
              if (blob) return { blob, resolution: step.label };
            } catch (error) {
              lastError = error;
              console.warn(`Fallo exportacion en ${step.label}. Se intenta una resolucion menor.`, error);
            }
          }
        } finally {
          restoreImages();
        }

        console.warn('La captura DOM fallo. Se usara render alternativo.', lastError);
        return renderOfferCanvasFallback(node);
      };
      // ==========================================
      // FUNCION: DESCARGA EN ALTA RESOLUCION (4K)
      // ==========================================
      elements.btnDownload.addEventListener('click', async () => {
        const node = elements.mainContainer;
        const btn = elements.btnDownload;

        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generando`;
        lucide.createIcons();

        // Guardar en el historial antes de descargar
        saveToHistory();

        try {
          await waitForImagesInNode(node);
          const { blob, resolution } = await exportOfferJpegBlob(node);
          const fileName = elements.name.value.replace(/[^a-z0-9]/gi, '-').toLowerCase();
          downloadBlobAsFile(blob, `estado-whatsapp-${fileName || 'producto'}.jpg`);
          console.info(`Oferta exportada en ${resolution}.`);
        } catch (error) {
          console.error('Error:', error);
          const detail = error?.message ? `\n\nDetalle tecnico: ${error.message}` : '';
          alert(`No se pudo exportar la imagen.${detail}`);
        } finally {
          btn.disabled = false;
          btn.innerHTML = `<i data-lucide="download" class="w-4 h-4"></i> Descargar`;
          lucide.createIcons();
        }
      });
      // Init UI
      elements.logo.addEventListener('error', () => {
        elements.logo.classList.add('hidden');
        elements.logoFallback.classList.remove('hidden');
      });
      elements.brandLogoImage.addEventListener('error', () => {
        elements.brandLogoBadge.style.display = 'none';
      });
      setBrandLogoForOffer('');
      applyTemplate('empresa_clean');
      updateDiscountControls();
      renderSaveButtonIdle();
      syncOfferPriceFromDiscount();
      updateOfferButtonVisibility();
      renderHistory();
    });
  </script>

  <script>

      const isFileProtocol = window.location.protocol === 'file:';
      if (isFileProtocol) return;

      const urlActual = new URL(window.location.href);
      if (urlActual.searchParams.has('build')) {
        urlActual.searchParams.delete('build');
        window.location.replace(urlActual.toString());
        return;
      }

      const storedBuild = localStorage.getItem(BUILD_KEY);
      if (storedBuild === CURRENT_BUILD) return;

      const limpiarCacheViejo = async () => {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {
          console.warn('No se pudo limpiar cache anterior de SeniorFlow', error);
        } finally {
          localStorage.setItem(BUILD_KEY, CURRENT_BUILD);
          window.location.reload();
        }
      };

      limpiarCacheViejo();
    })();
  </script>
